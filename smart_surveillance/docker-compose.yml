services:

  db:
    image: postgres:16-alpine
    container_name: smss_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: surveillance
      POSTGRES_USER: surveillance_user
      POSTGRES_PASSWORD: surveillance_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U surveillance_user -d surveillance"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: smss_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://surveillance_user:surveillance_pass@db:5432/surveillance
    ports:
      - "8000:8000"
    volumes:
      - ./videos:/app/videos
      - .:/app                      # bind mount entire project for hot reload
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/backend --reload-dir /app/core --reload-dir /app/scenarios
    # To use USB cameras, uncomment and set your device paths:
    # devices:
    #   - /dev/video0:/dev/video0
    #   - /dev/video1:/dev/video1

  frontend:
    image: node:20
    container_name: smss_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

volumes:
  pgdata:
