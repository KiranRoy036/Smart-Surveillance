server {
    listen 80;
    server_name _;

    # Serve the React app
    root /usr/share/nginx/html;
    index index.html;

    # React Router: all unknown paths → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy everything backend-related ─────────────────────────────────────
    # This means the frontend never needs to know the backend IP.
    # In docker-compose, "backend" resolves to the backend container.

    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    location /stream/ {
        proxy_pass             http://backend:8000;
        proxy_set_header       Host $host;
        # These three are required for MJPEG streaming to not buffer
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     3600s;
        chunked_transfer_encoding on;
    }

    location /cameras/ {
        proxy_pass             http://backend:8000;
        proxy_set_header       Host $host;
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     3600s;
        chunked_transfer_encoding on;
    }

    location /upload {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
        client_max_body_size 500M;    # allow large video uploads
    }

    location /stop {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
    }

    location /videos/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
    }
}
